name: Linux Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build current Linux installers (.deb + AppImage)
        working-directory: desktop
        run: |
          set -euo pipefail
          npm run test:linux
          npm run package
          npm run make:linux -- --skip-package

      - name: Normalize public artifact names and include release note
        run: |
          set -euo pipefail
          CURRENT_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p desktop/out/release-assets
          CURRENT_APPIMAGE_SOURCE="$(find desktop/out/make -type f -name '*.AppImage' | head -n 1)"
          CURRENT_DEB_SOURCE="$(find desktop/out/make -type f -name '*.deb' | head -n 1)"
          cp "$CURRENT_APPIMAGE_SOURCE" "desktop/out/release-assets/codex-app-linux-v${CURRENT_VERSION}.AppImage"
          cp "$CURRENT_DEB_SOURCE" "desktop/out/release-assets/codex-app-linux-v${CURRENT_VERSION}.deb"
          cat > "desktop/out/release-assets/RELEASE_NOTES_LINUX.txt" <<'EOF'
          Linux installers in this release:
          - codex-app-linux-v<current-version>.AppImage
          - codex-app-linux-v<current-version>.deb
          EOF

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-linux-installers
          path: |
            desktop/out/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: codex-app-linux ${{ github.ref_name }}
          files: |
            desktop/out/release-assets/*
