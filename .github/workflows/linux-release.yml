name: Linux Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Linux installers (.deb + AppImage)
        working-directory: desktop
        run: npm run make:linux

      - name: Normalize public artifact names
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p desktop/out/release-assets
          APPIMAGE_SOURCE="$(find desktop/out/make -type f -name '*.AppImage' | head -n 1)"
          DEB_SOURCE="$(find desktop/out/make -type f -name '*.deb' | head -n 1)"
          cp "$APPIMAGE_SOURCE" "desktop/out/release-assets/codex-app-linux-${VERSION}-x64.AppImage"
          cp "$DEB_SOURCE" "desktop/out/release-assets/codex-app-linux_${VERSION}_amd64.deb"

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-linux-installers
          path: |
            desktop/out/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: codex-app-linux ${{ github.ref_name }}
          files: |
            desktop/out/release-assets/*
